name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 打 v 开头的 tag 时触发，例如 v1.0.0
  workflow_dispatch:  # 也可以在 Actions 页面手动点按钮触发

jobs:
  build:
    runs-on: windows-latest
    
    # 修复：显式声明此工作流拥有向你的仓库写入、创建 Release 内容的权限，解决 Resource not accessible 报错
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 MSVC 开发人员命令提示
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 配置 CMake
        run: cmake -S joycon2_connector -B build -A x64

      - name: 编译 Release
        run: cmake --build build --config Release --verbose

      - name: 打包 exe
        run: |
          mkdir artifact
          copy build\Release\joycon2_connector.exe artifact\joycon2_connector.exe
        shell: cmd

      - name: 上传编译产物（供手动下载）
        uses: actions/upload-artifact@v4
        with:
          name: joycon2_connector
          path: artifact\joycon2_connector.exe

      # 以下步骤仅在打 tag 时执行，自动创建 Release 并附加 exe
      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact\joycon2_connector.exe
          body: |
            自动构建版本，已修复体感（陀螺仪）数据读取逻辑。
