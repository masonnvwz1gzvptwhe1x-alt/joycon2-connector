name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 打 v 开头的 tag 时触发，例如 v1.0.0
  workflow_dispatch:  # 也可以在 Actions 页面手动点按钮触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 修复：强行在 Actions 虚拟机中激活 MSVC 命令行开发环境（包括所需的编译器与 SDK 变量）
      - name: 设置 MSVC 开发人员命令提示
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 修复：移除导致找不到实例的硬编码 -G 生成器参数，直接让 CMake 走刚才激活的通用命令行编译环境
      - name: 配置 CMake
        run: cmake -S joycon2_connector -B build -A x64

      - name: 编译 Release
        run: cmake --build build --config Release

      - name: 打包 exe
        run: |
          mkdir artifact
          copy build\Release\joycon2_connector.exe artifact\joycon2_connector.exe
        shell: cmd

      - name: 上传编译产物（供手动下载）
        uses: actions/upload-artifact@v4
        with:
          name: joycon2_connector
          path: artifact\joycon2_connector.exe

      # 以下步骤仅在打 tag 时执行，自动创建 Release 并附加 exe
      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifact\joycon2_connector.exe
          body: |
            自动构建版本，已修复体感（陀螺仪）数据读取逻辑。
